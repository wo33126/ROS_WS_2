# ==============================================================================
#  VL53L1X 终点位置微调参数
# ==============================================================================

# ── 目标距离 (mm)：传感器期望读数值 ──
# 例如：小车需要停在距离前方障碍物 200mm 的位置
target_distance_mm: 200.0

# ── 允许误差 (mm)：偏差在此范围内即认为微调完成 ──
tolerance_mm: 10.0

# ── 移动轴：1 = X 轴（前/后），2 = Y 轴（左/右）─
move_axis: 1.0

# ── 移动方向：+1 正向（使距离减小），-1 反向（使距离增大）─
# 注意：方向含义取决于传感器安装朝向
#  - 如果传感器朝前，机器人前进时距离应该减小，move_direction 应设为 +1
#  - 如果误差为正（距离 > 目标），机器人需要前进，move_direction 应使机器人前进
move_direction: 1

# ── 步进速度 (m/s)：每次微移的最大线速度（受 /robot/max_linear_vel 约束）─
step_velocity: 0.05

# ── 步进持续时间 (s)：每次发布移动指令的时长 ──
step_duration: 0.2

# ── 稳定等待时间 (s)：步进结束后等待传感器读数稳定的时间 ──
settle_time: 0.3

# ── 控制循环频率 (Hz) ──
control_rate_hz: 10.0

# ── 微调超时 (s)：超过此时长未完成则强制结束 ──
max_fine_tuning_time: 30.0

# ── 最大微调步数：超过此次数则强制结束 (0=无限制) ──
max_steps: 50

# ── 距离误差比例增益 (m/s per mm)：将 mm 误差映射到线速度 ──
# 默认 0.0005，即 100mm 误差 → 0.05 m/s
kp_distance: 0.0005
