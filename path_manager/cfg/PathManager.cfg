#!/usr/bin/env python3
# -*- coding: utf-8 -*-
"""
dynamic_reconfigure 参数定义 —— 可实时修改当前路径点的目标位姿。
"""

from dynamic_reconfigure.parameter_generator_catkin import (
    ParameterGenerator, double_t, str_t, bool_t
)

gen = ParameterGenerator()

# ── 当前正在执行的路径点动态覆盖 ──
gen.add("override_enabled", bool_t, 0, "启用动态覆盖当前路径点", False)
gen.add("target_x",        double_t, 0, "动态覆盖目标 x (m)", 0.0, -100.0, 100.0)
gen.add("target_y",        double_t, 0, "动态覆盖目标 y (m)", 0.0, -100.0, 100.0)
gen.add("target_tolerance",double_t, 0, "动态覆盖到达误差阈值 (m)", 0.05, 0.0, 10.0)

# ── 执行控制 ──
gen.add("publish_rate_hz", double_t, 0, "路径点发布频率 (Hz)", 10.0, 1.0, 200.0)

exit(gen.generate("path_manager", "path_manager", "PathManager"))
